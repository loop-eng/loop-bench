id: "feat-webhook-014"
name: "Add webhook signature verification"
category: "feature"
difficulty: "hard"
language: "typescript"
description: |
  The webhook handler in src/webhook.ts accepts POST payloads from external
  services but performs no signature verification. Any party who knows the
  endpoint URL can send forged payloads, creating a security vulnerability.
goal: |
  Add HMAC-SHA256 signature verification to the webhook handler. The handler
  should verify the X-Signature-256 header against a shared secret using
  crypto.timingSafeEqual to prevent timing attacks. Reject invalid or missing
  signatures with a 401 status code.
repo:
  base_image: "node"
  setup_command: "npm install"
  test_command: "npx vitest run"
  build_command: "npx tsc --noEmit"
ground_truth:
  patch_file: "ground-truth/fix.patch"
  files_changed: ["src/webhook.ts"]
  lines_changed: 35
rubric:
  - criterion: "Uses crypto.timingSafeEqual for comparison"
    weight: 0.3
    check: "grep"
  - criterion: "HMAC-SHA256 signature computation is correct"
    weight: 0.3
    check: "grep"
  - criterion: "Rejects invalid or missing signatures with 401"
    weight: 0.2
    check: "test"
  - criterion: "All existing tests continue to pass"
    weight: 0.2
    check: "test"
constraints:
  max_iterations: 20
  max_cost_usd: 5.00
  timeout_minutes: 15
