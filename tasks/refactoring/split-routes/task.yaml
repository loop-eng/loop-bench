id: "refac-split-023"
name: "Split monolith route handler"
category: "refactoring"
difficulty: "hard"
language: "typescript"
description: |
  A single routes.ts file contains all route handlers for users, products,
  and orders at over 400 lines. This monolith is hard to navigate, test
  independently, and maintain as the API grows.
goal: |
  Split the monolith into separate route modules (users, products, orders)
  each under 200 lines of code, with a central router that delegates to them.
  All existing endpoint tests must continue to pass.
repo:
  base_image: "node"
  setup_command: "npm install"
  test_command: "npx vitest run"
  build_command: "npx tsc --noEmit"
ground_truth:
  patch_file: "ground-truth/fix.patch"
  files_changed: ["src/routes.ts", "src/routes/users.ts", "src/routes/products.ts", "src/routes/orders.ts"]
  lines_changed: 250
rubric:
  - criterion: "Original monolith file only contains routing setup"
    weight: 0.3
    check: "grep"
  - criterion: "Each module under 200 LOC"
    weight: 0.3
    check: "test"
  - criterion: "Clean module interfaces"
    weight: 0.2
    check: "ast"
  - criterion: "All existing tests pass"
    weight: 0.2
    check: "test"
constraints:
  max_iterations: 25
  max_cost_usd: 8.00
  timeout_minutes: 20
